<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sem Conexão — Psycologger</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .container {
        max-width: 400px;
        text-align: center;
        background: white;
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 1.5rem;
        background: #fee2e2;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
      }

      h1 {
        color: #1f2937;
        font-size: 24px;
        margin-bottom: 0.5rem;
        font-weight: 600;
      }

      p {
        color: #6b7280;
        font-size: 16px;
        line-height: 1.5;
        margin-bottom: 2rem;
      }

      button {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        background-color: #3b82f6;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }

      button:hover {
        background-color: #2563eb;
      }

      button:active {
        background-color: #1d4ed8;
      }

      .footer {
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid #e5e7eb;
        color: #9ca3af;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="icon">🌐</div>
      <h1>Sem Conexão</h1>
      <p>
        Você está offline. Verifique sua conexão com a internet e tente
        novamente.
      </p>
      <button onclick="window.location.reload()">Tentar Novamente</button>
      <div class="footer">Psycologger — Portal do Paciente</div>
    </div>
  </body>
</html>
